<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>WPS 图表渲染器</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:transparent; }
#chart { width:100%; height:100%; }
</style>
</head>
<body>
<div id="chart"></div>

<script>
(function () {
  const chart = echarts.init(document.getElementById('chart'));

  function render() {
    try {
      const params = new URLSearchParams(location.hash.slice(1));
      const b64 = params.get('data');
      if (!b64) return;

      // ✅ 关键：还原 Python 侧的 encodeURIComponent
      const jsonStr = decodeURIComponent(b64);
      const option = JSON.parse(jsonStr);

      chart.setOption(option);
      window.addEventListener('resize', () => chart.resize());
    } catch (e) {
      document.body.innerHTML =
        '<pre style="color:red;padding:20px;">' +
        '图表渲染失败：\n' + e.message + '</pre>';
      console.error(e);
    }
  }

  render();
})();
</script>
</body>
</html>
